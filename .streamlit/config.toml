# Streamlit Configuration File
# Used for both local development and Streamlit Cloud deployment

# ============================================================================
# SERVER SETTINGS
# ============================================================================
[server]
# Maximum file upload size in megabytes (200MB = sufficient for large PDFs)
maxUploadSize = 200

# Port for local development (default: 8501)
# port = 8501

# Enable CORS for external requests (useful for API integrations)
enableCORS = true

# Headless mode (useful for testing without browser)
# headless = false

# ============================================================================
# THEME SETTINGS
# ============================================================================
[theme]
# Primary color - vibrant blue for professional RAG application
primaryColor = "#0066CC"

# Background color - clean light background
backgroundColor = "#FFFFFF"

# Secondary background color - light gray for panels
secondaryBackgroundColor = "#F5F5F5"

# Text color - dark gray for readability
textColor = "#1F1F1F"

# Font family - clean sans-serif
font = "sans serif"

# ============================================================================
# CLIENT SETTINGS
# ============================================================================
[client]
# Show error details in the UI for debugging
showErrorDetails = true

# ============================================================================
# LOGGER SETTINGS
# ============================================================================
[logger]
# Log level: debug, info, warning, error, critical
level = "info"

# ============================================================================
# NOTES FOR STREAMLIT CLOUD
# ============================================================================
# .streamlit/secrets.toml is automatically created by Streamlit Cloud
# Do NOT commit secrets.toml to git - it contains sensitive data
# Instead, set secrets in Streamlit Cloud dashboard:
#   1. Go to app.streamlit.io
#   2. Right-click your app → Settings
#   3. Secrets section → Add GROQ_API_KEY
